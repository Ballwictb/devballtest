name: Check environment secret

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: "Nombre del secret a comprobar"
        required: true
        default: "CLIENTE_MADRID"
      target_env:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - pre
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}

    steps:
      - uses: actions/checkout@v4

      - name: Cargar secret dinámico
        env:
          RAW_SECRET: ${{ secrets[inputs.secret_name] }}
        run: |
          if [ -z "$RAW_SECRET" ]; then
            echo "ERROR: el secret no existe o está vacío"
            exit 1
          fi

          echo "Secret encontrado en el environment ${{ inputs.target_env }}"
          echo "::add-mask::$RAW_SECRET"

          python - <<'PY'
          import os, json, sys

          raw = os.environ["RAW_SECRET"]

          try:
              data = json.loads(raw)
          except Exception as e:
              print("ERROR: el secret no contiene un JSON válido")
              print(e)
              sys.exit(1)

          client_id = data.get("oauthClient_Id", "")
          client_secret = data.get("oauthClientSecret", "")

          if not client_id:
              print("ERROR: falta oauthClient_Id")
              sys.exit(1)

          if not client_secret:
              print("ERROR: falta oauthClientSecret")
              sys.exit(1)

          # Enmascaramos también los campos extraídos
          print(f"::add-mask::{client_id}")
          print(f"::add-mask::{client_secret}")

          print("JSON correcto")
          print(f"oauthClient_Id existe: sí")
          print(f"oauthClientSecret existe: sí")
          print(f"Longitud oauthClient_Id: {len(client_id)}")
          print(f"Longitud oauthClientSecret: {len(client_secret)}")
          print(f"Prefijo oauthClient_Id: {client_id[:4]}***")
          print(f"Prefijo oauthClientSecret: {client_secret[:4]}***")
          PY
